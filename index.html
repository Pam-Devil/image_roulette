<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles/styles.css">
    <title>Image Roussel</title>
</head>

<body>
    <main>
        <div class="button-container">
            <button id="run-btn">Run</button>
            <button id="reset-btn">Reset</button>
            <button id="add-btn">Add</button>
        </div>

        <div class="selected-container">
            <img src="./images/9.png" alt="img">
        </div>

        <div class="add-container" id="add-container">
            <div class="add-images" id="add-images">
                <label for="upload"> Suas imagens aqui</label>
                <input type="file" id="upload" name="avatar" accept="image/png, image/jpeg, image/gif image/webp image/webm image/jfif" multiple />
            </div>
        </div>

        <div class="list-container">

            <div class="viewport">
                <section class="carousel-container" id="carousel-container">
                    
                </section>
            </div>

        </div>

    </main>


    <script src="./src/main.js"></script>
</body>

</html>
